services:
  - type: web
    name: devquest
    env: node
    plan: free
    buildCommand: ./render-build.sh
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: devquest-db
          property: connectionString

databases:
  - name: devquest-db
    plan: free